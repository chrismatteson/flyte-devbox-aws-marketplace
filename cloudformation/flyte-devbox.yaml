AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Single-EC2 Flyte devbox with S3 object store, dedicated EBS data volume on a
  daily snapshot plan, CloudWatch-driven auto-stop, and a public Lambda Function
  URL for one-click wake. Plain HTTP — customers use `insecure: true` in their
  flyte client config.

Parameters:
  VpcCidr:
    Type: String
    Default: 10.20.0.0/16
    Description: >
      CIDR for the VPC the stack creates. Must NOT overlap with the k3s pod CIDR
      (10.42.0.0/16) or service CIDR (10.43.0.0/16), or in-cluster DNS will
      route to flannel and break image pulls.

  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$
    ConstraintDescription: Must be a CIDR like 1.2.3.4/32 or 10.0.0.0/16
    Description: |
      CIDR allowed to reach the devbox public ports (80 UI/API, 8081 serving, 5000 docker registry).
      Use 1.2.3.4/32 for a single laptop, your corporate egress range (e.g. 10.0.0.0/16) for an office,
      or 0.0.0.0/0 for open access (not recommended for production). To allow multiple ranges, deploy
      with this set to your primary range and add additional SG ingress rules after launch.
      In Prod mode (Domain set), this gates the ALB instead.
      Ignored entirely if NoPublicIngress=Yes.

  InstanceType:
    Type: String
    Default: m6i.2xlarge
    Description: |
      EC2 instance type for the devbox host. Default m6i.2xlarge = 8 vCPU / 32 GB RAM,
      ~$9.20/day on-demand in us-east-1. The devbox runs k3s + Flyte + your
      workloads; 2 vCPU machines (t3.large etc.) starve quickly under any real load.

  DataVolumeSizeGb:
    Type: Number
    Default: 50

  IdleThresholdMinutes:
    Type: Number
    Default: 30
    MinValue: 5

  DevboxImage:
    Type: String
    Default: cr.flyte.org/flyteorg/flyte-devbox:latest

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/canonical/ubuntu/server/24.04/stable/current/amd64/hvm/ebs-gp3/ami-id

  # ---- Prod mode ----------------------------------------------------------
  # Set Domain to a hostname you control + HostedZoneId for that zone to enable
  # an ALB with HTTPS via ACM (cert auto-validated) and a Route 53 A record.
  # Leaves auto-stop off (Prod is meant to be always-on). Eval mode (default)
  # keeps the direct-EIP + auto-stop pattern.
  Domain:
    Type: String
    Default: ""
    Description: Optional. Hostname for HTTPS access (e.g. flyte.acme.com). When set, the stack enables Prod mode (ALB + ACM + Route 53). When empty, Eval mode (direct EIP) is used.
  HostedZoneId:
    Type: String
    Default: ""
    Description: Required when Domain is set. Route 53 hosted zone ID containing Domain (used for DNS-validated ACM cert + the A record).

  # ---- Private mode -------------------------------------------------------
  # Set NoPublicIngress=Yes to suppress the EIP and the public SG ingress
  # rules. The EC2 still has a public IP for outbound (Docker pulls) but
  # nothing from the internet can reach it. Customer brings their own access
  # (SSM Session Manager, Tailscale via cloud-init add-on, PrivateLink, etc.).
  NoPublicIngress:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
    Description: When Yes, don't attach an EIP and don't open SG ingress to the world. Combine with Domain="" for a fully private deployment.

  StableIp:
    Type: String
    Default: "No"
    AllowedValues: ["Yes", "No"]
    Description: |
      When Yes, allocate an Elastic IP so the public hostname survives stop/start cycles
      (costs ~$3.65/mo even when the EC2 is stopped). When No, the EC2 gets a fresh
      auto-assigned public IP every time it starts; bookmarks and the stack outputs
      go stale. Re-fetch the current hostname with the CLI snippet in the stack outputs.
      Default No to keep idle cost ~$0. Ignored in Prod mode (ALB handles ingress).

  AutoStop:
    Type: String
    Default: "Yes"
    AllowedValues: ["Yes", "No"]
    Description: |
      When Yes, the EC2 auto-stops after IdleThresholdMinutes of no active Flyte
      executions. In Eval mode the customer wakes it via the StartCli output. In
      Prod mode (Domain set) the ALB hosts a Lambda wake-page that starts the EC2
      and forwards once it's healthy — customers hit the same URL and wait.
      Set No for always-on (recommended for serious Prod workloads).

Conditions:
  IsProd: !Not [!Equals [!Ref Domain, ""]]
  WantsEvalPublic: !And
    - !Equals [!Ref Domain, ""]
    - !Equals [!Ref NoPublicIngress, "No"]
  WantsEip: !And
    - !Equals [!Ref Domain, ""]
    - !Equals [!Ref NoPublicIngress, "No"]
    - !Equals [!Ref StableIp, "Yes"]
  WantsAutoStop: !Equals [!Ref AutoStop, "Yes"]
  WantsProdWake: !And
    - !Not [!Equals [!Ref Domain, ""]]
    - !Equals [!Ref AutoStop, "Yes"]

Resources:

  # -------------------------------------------------------------------------
  # Networking: one VPC, one public subnet (no HA — single EC2).
  # -------------------------------------------------------------------------
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags: [{Key: Name, Value: !Sub "${AWS::StackName}-vpc"}]

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: !Sub "${AWS::StackName}-igw"}]

  IgwAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: !Select [0, !Cidr [!Ref VpcCidr, 1, 8]]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub "${AWS::StackName}-public"}]

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # -------------------------------------------------------------------------
  # S3: per-stack object store. Created only in Prod mode (Domain set), where
  # the marketplace customer is meant to wire Flyte to it via the documented
  # PROD_WIRING steps. In Eval/Private modes the devbox uses in-cluster
  # rustfs and the bucket is not created.
  # -------------------------------------------------------------------------
  DataBucket:
    Type: AWS::S3::Bucket
    Condition: IsProd
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "${AWS::StackName}-flyte-${AWS::AccountId}-${AWS::Region}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: {SSEAlgorithm: AES256}

  # -------------------------------------------------------------------------
  # IAM: EC2 instance role. Always-on policies: SSM + CloudWatch. The S3
  # bucket policy is attached only in Prod mode via a separate managed
  # policy (below) since the bucket itself is Prod-only.
  # -------------------------------------------------------------------------
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: ec2.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: flyte-devbox-cloudwatch
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: cloudwatch:PutMetricData
                Resource: "*"
                Condition:
                  StringEquals: {cloudwatch:namespace: FlyteDevbox}
              # Boot-time fetch of large assets (idle agent, Envoy config) that
              # live in SSM Parameters to keep EC2 user-data under its 16 KB limit.
              - Effect: Allow
                Action: ssm:GetParameter
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${AWS::StackName}/flyte/*"
              # Self-attach the data volume at boot (no CFN attachment).
              - Effect: Allow
                Action: [ec2:AttachVolume, ec2:DescribeVolumes]
                Resource: "*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties: {Roles: [!Ref InstanceRole]}

  # -------------------------------------------------------------------------
  # SG: allow the three devbox ports directly from AllowedCidr.
  # -------------------------------------------------------------------------
  # SG is always created. Ingress rules are added separately so we can gate
  # each on the relevant Condition: Eval mode opens to AllowedCidr; Prod mode
  # only allows the ALB SG; Private mode opens nothing.
  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: Flyte devbox.

  EvalIngressUi:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantsEvalPublic
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 80
      ToPort: 80
      CidrIp: !Ref AllowedCidr
      Description: Flyte UI + gRPC

  EvalIngressServing:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantsEvalPublic
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 8081
      ToPort: 8081
      CidrIp: !Ref AllowedCidr
      Description: flyte.App serving

  EvalIngressRegistry:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantsEvalPublic
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 5000
      ToPort: 5000
      CidrIp: !Ref AllowedCidr
      Description: Docker registry

  # rustfs S3 NodePort — clients PUT bundles to signed URLs generated by
  # dataproxy that point at <ec2-hostname>:30002. Required for laptop->remote
  # `flyte run`; not needed if customer always runs Flyte CLI on the EC2.
  EvalIngressRustfs:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: WantsEvalPublic
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 30002
      ToPort: 30002
      CidrIp: !Ref AllowedCidr
      Description: rustfs S3 NodePort (signed URL target)

  ProdIngressFromAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: IsProd
    Properties:
      GroupId: !Ref InstanceSecurityGroup
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      Description: From ALB only (to the on-host Envoy auth proxy)

  # -------------------------------------------------------------------------
  # Dedicated EBS volume for /var/lib/docker. Survives EC2 replacement; daily
  # AWS Backup snapshot with 7-day retention.
  # -------------------------------------------------------------------------
  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      AvailabilityZone: !Select [0, !GetAZs ""]
      Size: !Ref DataVolumeSizeGb
      VolumeType: gp3
      Encrypted: true
      Tags:
        - {Key: Name, Value: !Sub "${AWS::StackName}-flyte-data"}
        - {Key: flyte-devbox:backup, Value: "true"}

  # -------------------------------------------------------------------------
  # Elastic IP — only in Eval mode with public ingress. Prod mode uses the
  # ALB DNS name; Private mode skips inbound entirely.
  # -------------------------------------------------------------------------
  InstanceEip:
    Type: AWS::EC2::EIP
    Condition: WantsEip
    Properties:
      Domain: vpc
      Tags: [{Key: Name, Value: !Sub "${AWS::StackName}-eip"}]

  EipAssociation:
    Type: AWS::EC2::EIPAssociation
    Condition: WantsEip
    Properties:
      AllocationId: !GetAtt InstanceEip.AllocationId
      InstanceId: !Ref Instance

  # -------------------------------------------------------------------------
  # EC2. HopLimit=2 so containers reach IMDS for the instance role creds.
  # -------------------------------------------------------------------------
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile: {Arn: !GetAtt InstanceProfile.Arn}
        MetadataOptions:
          # HttpTokens=optional (IMDSv1+v2): Flyte's stow S3 library (AWS SDK Go v1)
          # only speaks IMDSv1; with IMDSv2-required the SDK silently fails to
          # resolve EC2 instance-role credentials and dataproxy can't presign URLs.
          # Risk is SSRF-via-IMDS from user pods, but those pods already have
          # the instance role attached via IMDS by design.
          # HopLimit=3: hop chain from a k3s pod is host -> docker0 -> k3s -> pod.
          HttpTokens: optional
          HttpPutResponseHopLimit: 3
          HttpEndpoint: enabled
        SecurityGroupIds: [!Ref InstanceSecurityGroup]
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: 30
              VolumeType: gp3
              DeleteOnTermination: true
              Encrypted: true
        UserData:
          Fn::Base64:
            Fn::Sub:
              - |
                #!/bin/bash
                set -euo pipefail
                exec > >(tee -a /var/log/flyte-devbox-init.log) 2>&1
                echo "[$(date -u +%FT%TZ)] flyte-devbox init starting"

                AWS_REGION="${AwsRegion}"
                DEVBOX_IMAGE="${DevboxImage}"
                DATA_DEVICE="${DataDevice}"
                DATA_VOLUME_ID="${DataVolumeId}"
                IDLE_AGENT_PARAM="${IdleAgentParamName}"
                GPU_SETUP_PARAM="${GpuSetupParamName}"

                IMDS_TOKEN=$(curl -s -X PUT 'http://169.254.169.254/latest/api/token' -H 'X-aws-ec2-metadata-token-ttl-seconds: 300')
                INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $IMDS_TOKEN" http://169.254.169.254/latest/meta-data/instance-id)

                export DEBIAN_FRONTEND=noninteractive

                # Base tooling + AWS CLI v2 first (needed to self-attach the data
                # volume below). Ubuntu 24.04 has no installable 'awscli' apt pkg.
                if ! command -v aws >/dev/null; then
                  apt-get update
                  apt-get install -y ca-certificates curl gnupg python3-pip python3-venv jq unzip
                  curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
                  unzip -q /tmp/awscliv2.zip -d /tmp
                  /tmp/aws/install
                  rm -rf /tmp/aws /tmp/awscliv2.zip
                fi

                # Self-attach the data volume by ID (no CFN attachment -> instance is
                # freely replaceable). Best-effort; prod state is external (RDS/S3).
                mkdir -p /var/lib/docker
                for i in $(seq 1 60); do
                  owner=$(aws ec2 describe-volumes --volume-ids "$DATA_VOLUME_ID" --region "$AWS_REGION" --query 'Volumes[0].Attachments[0].InstanceId' --output text 2>/dev/null || echo "")
                  [ "$owner" = "$INSTANCE_ID" ] && break
                  aws ec2 attach-volume --volume-id "$DATA_VOLUME_ID" --instance-id "$INSTANCE_ID" --device /dev/sdf --region "$AWS_REGION" >/dev/null 2>&1 && break
                  sleep 5
                done
                for i in $(seq 1 30); do [ -e "$DATA_DEVICE" ] && break; sleep 2; done
                if [ -e "$DATA_DEVICE" ]; then
                  blkid "$DATA_DEVICE" >/dev/null 2>&1 || mkfs.ext4 -L flyte-data "$DATA_DEVICE"
                  grep -q flyte-data /etc/fstab || echo "LABEL=flyte-data /var/lib/docker ext4 defaults,nofail 0 2" >> /etc/fstab
                  mount -a || true
                else
                  echo "data volume not attached; using root volume for /var/lib/docker"
                fi

                # Docker
                if ! command -v docker >/dev/null; then
                  install -m 0755 -d /etc/apt/keyrings
                  curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
                  chmod a+r /etc/apt/keyrings/docker.gpg
                  ARCH=$(dpkg --print-architecture)
                  . /etc/os-release
                  echo "deb [arch=$ARCH signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $VERSION_CODENAME stable" \
                      > /etc/apt/sources.list.d/docker.list
                  apt-get update
                  apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
                  systemctl enable --now docker
                fi

                # GPU: if an NVIDIA device is present (PCI vendor 0x10de), install the
                # driver + container toolkit (from SSM, to keep user-data small),
                # switch to the gpu image variant, and pass --gpus all to the devbox.
                # No instance-type list — pure hardware detection. Dormant on CPU nodes.
                GPU_FLAG=""
                if grep -qil 10de /sys/bus/pci/devices/*/vendor 2>/dev/null; then
                  echo "NVIDIA GPU detected; enabling GPU mode"
                  aws ssm get-parameter --name "$GPU_SETUP_PARAM" --region "$AWS_REGION" --query Parameter.Value --output text > /tmp/gpu-setup.sh
                  bash /tmp/gpu-setup.sh || echo "gpu setup reported errors (continuing)"
                  GPU_FLAG="--gpus all"
                  DEVBOX_IMAGE=$(echo "$DEVBOX_IMAGE" | sed 's/:latest$/:gpu-latest/')
                fi

                # No 999-extra-config.yaml override. The devbox runs with chart
                # defaults: rustfs for object storage, embedded postgres for the
                # runs DB, in-cluster docker-registry for images. All data lives
                # on the EBS data volume (mounted at /var/lib/docker), snapshotted
                # nightly by AWS Backup.
                #
                # In Prod mode (Domain set) the stack provisions external S3 /
                # RDS / ECR resources as a stub; wiring Flyte to use them is a
                # documented v1.5 step rather than baked into user-data, because
                # overriding the chart's storage config fights Viper merge
                # semantics, the k3s addon reconciler, and the SDK's IMDSv1
                # fallback in ways that were not productive for a v1 demo.
                # See docs/PROD_WIRING.md.
                mkdir -p /etc/flyte-devbox
                : > /etc/flyte-devbox/config.yaml

                # Prod-mode wiring parameters (DB_* / BUCKET_* are "none" outside
                # Prod). The render script below uses these to point Flyte at
                # external S3 + RDS in Prod mode. See docs/PROD_WIRING.md.
                cat > /etc/flyte-devbox/render.env <<EOF
                PROD_MODE=${ProdMode}
                BUCKET_NAME=${BucketName}
                DB_HOST=${DbHost}
                DB_PORT=${DbPort}
                DB_NAME=flyte
                DB_USER=flyte
                DB_SECRET_ARN=${DbSecretArn}
                API_KEY_SECRET_ARN=${ApiKeySecretArn}
                ENVOY_PARAM=${EnvoyParamName}
                RENDER_REGION=${AwsRegion}
                EOF
                chmod 0600 /etc/flyte-devbox/render.env

                # Helper: render /var/lib/flyte/config/config.yaml (the devbox's
                # 999-extra-config override, loaded last so it wins) on every boot.
                #   - Prod mode: full external-backend override — S3 for the object
                #     store (replaces in-cluster rustfs) and RDS Postgres for the
                #     runs DB (replaces embedded postgres). Embedded postgres + rustfs
                #     still run (the flyte-binary wait-for-db initContainer probes
                #     postgresql.flyte) but are unused.
                #   - Eval mode: just point signedURL at the EC2 public hostname so
                #     remote `flyte run` uploads bundles to the rustfs NodePort.
                cat > /usr/local/bin/flyte-render-override.sh <<'HELPER_EOF'
                #!/bin/bash
                set -euo pipefail
                source /etc/flyte-devbox/render.env

                if [ "$PROD_MODE" = "1" ]; then
                  PW=$(aws secretsmanager get-secret-value \
                         --secret-id "$DB_SECRET_ARN" --region "$RENDER_REGION" \
                         --query SecretString --output text \
                       | python3 -c 'import sys,json; print(json.load(sys.stdin)["password"])')
                  cat > /etc/flyte-devbox/config.yaml <<EOF
                runs:
                  storagePrefix: s3://$BUCKET_NAME
                  database:
                    postgres:
                      host: $DB_HOST
                      port: $DB_PORT
                      dbName: $DB_NAME
                      user: $DB_USER
                      username: $DB_USER
                      password: "$PW"
                      options: sslmode=require
                storage:
                  type: stow
                  stow:
                    kind: s3
                    config:
                      region: $RENDER_REGION
                      auth_type: iam
                      endpoint: ""
                      disable_ssl: false
                      v2_signing: false
                      access_key_id: ""
                      secret_key: ""
                  container: $BUCKET_NAME
                  signedURL:
                    stowConfigOverride:
                      endpoint: ""
                plugins:
                  k8s:
                    default-env-vars:
                    - AWS_REGION: $RENDER_REGION
                    - AWS_DEFAULT_REGION: $RENDER_REGION
                    - _U_EP_OVERRIDE: flyte-binary-http.flyte:8090
                    - _U_INSECURE: "true"
                    - _U_USE_ACTIONS: "1"
                internalApps:
                  defaultEnvVars:
                  - AWS_REGION: $RENDER_REGION
                  - AWS_DEFAULT_REGION: $RENDER_REGION
                  - _U_EP_OVERRIDE: flyte-binary-http.flyte:8090
                  - _U_INSECURE: "true"
                  - _U_USE_ACTIONS: "1"
                EOF
                  echo "rendered Prod override (S3=$BUCKET_NAME RDS=$DB_HOST)"
                  exit 0
                fi

                # Eval mode: point signed URLs at the current public hostname.
                TOKEN=$(curl -sX PUT http://169.254.169.254/latest/api/token -H "X-aws-ec2-metadata-token-ttl-seconds: 300")
                HOST=$(curl -sH "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/public-hostname)
                if [ -z "$HOST" ]; then
                  echo "no public hostname; leaving override empty (UI/local-only)"
                  : > /etc/flyte-devbox/config.yaml
                  exit 0
                fi
                cat > /etc/flyte-devbox/config.yaml <<EOF
                storage:
                  signedURL:
                    stowConfigOverride:
                      endpoint: http://$HOST:30002
                EOF
                HELPER_EOF
                chmod 0755 /usr/local/bin/flyte-render-override.sh

                # Auth proxy (Prod only): an on-EC2 Envoy that sits between the ALB
                # and the devbox and requires a static API key on every UI + gRPC
                # request (Bearer for the CLI, HTTP Basic for the browser). The
                # 'apikey' secret field is a COMMA-SEPARATED list of valid tokens;
                # this builds one Bearer + one Basic Lua-table entry per token and
                # substitutes them into the Envoy config's __OKENTRIES__ marker.
                # /healthz + /readyz are exempt so ALB health checks pass. Flyte 2
                # OSS has no native auth; this is the gate. Add/rotate tokens by
                # editing the secret (see docs/AUTH.md) and restarting this service.
                cat > /usr/local/bin/flyte-render-authproxy.sh <<'AUTHPROXY_EOF'
                #!/bin/bash
                set -euo pipefail
                source /etc/flyte-devbox/render.env
                if [ "$PROD_MODE" != "1" ]; then
                  exit 0
                fi
                APIKEYS=$(aws secretsmanager get-secret-value \
                            --secret-id "$API_KEY_SECRET_ARN" --region "$RENDER_REGION" \
                            --query SecretString --output text \
                          | python3 -c 'import sys,json; print(json.load(sys.stdin)["apikey"])')
                ENTRIES=""
                for t in $(echo "$APIKEYS" | tr ',' ' '); do
                  b=$(printf 'flyte:%s' "$t" | base64 | tr -d '\n')
                  ENTRIES="$ENTRIES['Bearer $t']=true,['Basic $b']=true,"
                done
                aws ssm get-parameter --name "$ENVOY_PARAM" --region "$RENDER_REGION" \
                  --query Parameter.Value --output text > /etc/flyte-devbox/envoy.yaml
                sed -i "s|__OKENTRIES__|$ENTRIES|g" /etc/flyte-devbox/envoy.yaml
                chmod 0600 /etc/flyte-devbox/envoy.yaml
                echo "rendered Envoy auth-proxy config"
                AUTHPROXY_EOF
                chmod 0755 /usr/local/bin/flyte-render-authproxy.sh

                cat > /etc/systemd/system/flyte-auth-proxy.service <<'PROXYUNIT_EOF'
                [Unit]
                Description=Flyte auth proxy (Envoy) - static API key gate for UI + gRPC
                After=flyte-devbox.service network-online.target
                Wants=network-online.target

                [Service]
                Type=simple
                Restart=on-failure
                RestartSec=10
                ExecStartPre=-/usr/bin/docker rm -f flyte-auth-proxy
                ExecStartPre=/usr/local/bin/flyte-render-authproxy.sh
                # Single line on purpose (systemd preserves leading whitespace of
                # `\`-continued lines). --entrypoint envoy bypasses the image's
                # docker-entrypoint.sh, which mangles the `-c <path>` argument.
                ExecStart=/usr/bin/docker run --rm --name flyte-auth-proxy --network host --entrypoint envoy --volume /etc/flyte-devbox/envoy.yaml:/etc/envoy/envoy.yaml:ro envoyproxy/envoy:v1.34-latest -c /etc/envoy/envoy.yaml
                ExecStop=/usr/bin/docker stop -t 10 flyte-auth-proxy

                [Install]
                WantedBy=multi-user.target
                PROXYUNIT_EOF

                cat > /etc/systemd/system/flyte-devbox.service <<UNIT_EOF
                [Unit]
                Description=Flyte devbox k3s cluster
                After=docker.service network-online.target
                Wants=docker.service network-online.target

                [Service]
                Type=simple
                Restart=on-failure
                RestartSec=10
                ExecStartPre=-/usr/bin/docker rm -f flyte-devbox
                ExecStartPre=/usr/bin/docker volume create flyte-devbox
                ExecStartPre=/usr/local/bin/flyte-render-override.sh
                # Reset idle counter on every devbox (re)start so a fresh start
                # doesn't immediately trip the auto-stop alarm. We mirror the
                # same line in the idle-agent service for the EC2-boot case.
                ExecStartPre=-/bin/rm -f /var/lib/flyte-idle-agent/state
                ExecStart=/usr/bin/docker run --rm --name flyte-devbox \\
                  --privileged \\
                  --add-host host.docker.internal:host-gateway \\
                  --env K3S_KUBECONFIG_OUTPUT=/.kube/kubeconfig \\
                  --volume /var/lib/flyte-devbox-kube:/.kube \\
                  --volume /etc/flyte-devbox:/var/lib/flyte/config \\
                  --volume flyte-devbox:/var/lib/flyte/storage \\
                  --publish 80:30080 \\
                  --publish 5000:30000 \\
                  --publish 30001:30001 \\
                  --publish 30002:30002 \\
                  --publish 30003:30003 \\
                  --publish 8081:30081 \\
                  --publish 6443:6443 \\
                  $GPU_FLAG \\
                  $DEVBOX_IMAGE
                ExecStop=/usr/bin/docker stop -t 30 flyte-devbox

                [Install]
                WantedBy=multi-user.target
                UNIT_EOF

                mkdir -p /var/lib/flyte-devbox-kube /opt/flyte-idle-agent /etc/flyte-idle-agent /var/lib/flyte-idle-agent

                aws ssm get-parameter --name "$IDLE_AGENT_PARAM" --region "$AWS_REGION" \
                  --query Parameter.Value --output text > /opt/flyte-idle-agent/flyte_idle_agent.py
                chmod 0755 /opt/flyte-idle-agent/flyte_idle_agent.py

                cat > /etc/flyte-idle-agent/env <<EOF
                AWS_REGION=$AWS_REGION
                INSTANCE_ID=$INSTANCE_ID
                METRIC_NAMESPACE=FlyteDevbox
                POLL_INTERVAL_SECONDS=60
                FLYTE_ENDPOINT=localhost:80
                EOF
                chmod 0600 /etc/flyte-idle-agent/env

                cat > /etc/systemd/system/flyte-idle-agent.service <<'UNIT_EOF'
                [Unit]
                Description=Flyte devbox idle polling agent
                After=flyte-devbox.service network-online.target
                Wants=flyte-devbox.service network-online.target

                [Service]
                Type=simple
                EnvironmentFile=/etc/flyte-idle-agent/env
                # Reset idle counter on every EC2 boot so the auto-stop alarm
                # doesn't fire immediately when starting from a stopped state.
                ExecStartPre=/bin/rm -f /var/lib/flyte-idle-agent/state
                ExecStart=/opt/flyte-idle-agent/venv/bin/python /opt/flyte-idle-agent/flyte_idle_agent.py
                Restart=always
                RestartSec=15
                User=root

                [Install]
                WantedBy=multi-user.target
                UNIT_EOF

                python3 -m venv /opt/flyte-idle-agent/venv
                /opt/flyte-idle-agent/venv/bin/pip install --quiet --upgrade pip
                /opt/flyte-idle-agent/venv/bin/pip install --quiet flyte boto3

                systemctl daemon-reload
                systemctl enable flyte-devbox.service
                systemctl start flyte-devbox.service

                for i in $(seq 1 60); do
                  if curl -fsS http://localhost:80/healthz >/dev/null 2>&1; then
                    echo "[$(date -u +%FT%TZ)] devbox ready after $i polls"
                    break
                  fi
                  sleep 5
                done

                # Prod only: start the Envoy auth proxy (ALB -> :8080 -> devbox:80,
                # static API key required). Pre-pull so the systemd start is fast.
                if [ "${ProdMode}" = "1" ]; then
                  docker pull envoyproxy/envoy:v1.34-latest || true
                  systemctl enable flyte-auth-proxy.service
                  systemctl start flyte-auth-proxy.service
                fi

                systemctl enable flyte-idle-agent.service
                systemctl start flyte-idle-agent.service

                echo "[$(date -u +%FT%TZ)] flyte-devbox init done"
              - AwsRegion: !Ref AWS::Region
                DevboxImage: !Ref DevboxImage
                DataDevice: /dev/nvme1n1
                ProdMode: !If [IsProd, "1", "0"]
                BucketName: !If [IsProd, !Ref DataBucket, "none"]
                DbHost: !If [IsProd, !GetAtt DbInstance.Endpoint.Address, "none"]
                DbPort: !If [IsProd, !GetAtt DbInstance.Endpoint.Port, "5432"]
                DbSecretArn: !If [IsProd, !Ref DbPasswordSecret, "none"]
                ApiKeySecretArn: !If [IsProd, !Ref ApiKeySecret, "none"]
                IdleAgentParamName: !Ref IdleAgentScriptParam
                EnvoyParamName: !If [IsProd, !Ref EnvoyConfigParam, "none"]
                DataVolumeId: !Ref DataVolume
                GpuSetupParamName: !Ref GpuSetupScriptParam

  # ------------------------------------------------------------------------
  # Large boot assets stored as SSM Parameters (not in EC2 user-data, which
  # has a hard 16 KB limit). Fetched at boot via the instance role.
  # ------------------------------------------------------------------------
  # NVIDIA driver + container toolkit installer, fetched + run by user-data only
  # when an NVIDIA GPU is detected. Configures the docker nvidia runtime so
  # `docker run --gpus all` (the devbox GPU mode) works.
  GpuSetupScriptParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/flyte/gpu-setup.sh"
      Type: String
      Tier: Standard
      Value: |
        #!/bin/bash
        set -uo pipefail
        export DEBIAN_FRONTEND=noninteractive
        # NVIDIA driver (DKMS; builds against the running kernel).
        apt-get update
        apt-get install -y ubuntu-drivers-common
        ubuntu-drivers install --gpgpu || apt-get install -y nvidia-driver-550-server || true
        # nvidia-container-toolkit (configures the docker runtime for --gpus all)
        install -d -m 0755 /usr/share/keyrings
        curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey \
          | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
        curl -fsSL https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list \
          | sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' \
          > /etc/apt/sources.list.d/nvidia-container-toolkit.list
        apt-get update
        apt-get install -y nvidia-container-toolkit
        nvidia-ctk runtime configure --runtime=docker
        systemctl restart docker
        modprobe nvidia || true

  IdleAgentScriptParam:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${AWS::StackName}/flyte/idle-agent.py"
      Type: String
      Tier: Standard
      Value: |
        """Idle polling agent.

        Every minute, asks Flyte if any execution is in an active phase. If yes,
        idle = 0. Else, idle += 1. Publishes IdleMinutes to CloudWatch. A
        CloudWatch alarm on the metric drives the stop lambda.
        """
        from __future__ import annotations
        import asyncio, logging, os, time
        from pathlib import Path
        import boto3, flyte
        from flyte.models import ActionPhase
        from flyte.remote import Run

        _ENDPOINT = os.environ.get("FLYTE_ENDPOINT", "localhost:30080")
        _POLL_INTERVAL_SECONDS = int(os.environ.get("POLL_INTERVAL_SECONDS", "60"))
        _METRIC_NAMESPACE = os.environ.get("METRIC_NAMESPACE", "FlyteDevbox")
        _INSTANCE_ID = os.environ["INSTANCE_ID"]
        _REGION = os.environ["AWS_REGION"]
        _STATE_FILE = Path("/var/lib/flyte-idle-agent/state")
        _ACTIVE_PHASES: tuple[ActionPhase, ...] = (
            ActionPhase.QUEUED,
            ActionPhase.WAITING_FOR_RESOURCES,
            ActionPhase.INITIALIZING,
            ActionPhase.RUNNING,
        )

        logging.basicConfig(level=logging.INFO, format="%(asctime)s %(levelname)s %(message)s")
        log = logging.getLogger("flyte-idle-agent")

        def _read_state() -> int:
            try: return int(_STATE_FILE.read_text().strip())
            except (FileNotFoundError, ValueError): return 0

        def _write_state(v: int) -> None:
            _STATE_FILE.parent.mkdir(parents=True, exist_ok=True)
            _STATE_FILE.write_text(str(v))

        async def _any_active_runs() -> bool:
            async for _ in Run.listall.aio(in_phase=_ACTIVE_PHASES, limit=1):
                return True
            return False

        def _publish(cw, idle_minutes: int) -> None:
            cw.put_metric_data(
                Namespace=_METRIC_NAMESPACE,
                MetricData=[{
                    "MetricName": "IdleMinutes",
                    "Dimensions": [{"Name": "InstanceId", "Value": _INSTANCE_ID}],
                    "Value": float(idle_minutes),
                    "Unit": "Count",
                }],
            )

        async def _poll_once(cw, idle_minutes: int) -> int:
            try: active = await _any_active_runs()
            except Exception:
                log.exception("query failed; idle unchanged")
                return idle_minutes
            new_value = 0 if active else idle_minutes + max(1, _POLL_INTERVAL_SECONDS // 60)
            try: _publish(cw, new_value)
            except Exception: log.exception("publish failed")
            _write_state(new_value)
            log.info("idle_minutes=%d active=%s", new_value, active)
            return new_value

        async def _main() -> None:
            flyte.init(endpoint=_ENDPOINT, insecure=True)
            cw = boto3.client("cloudwatch", region_name=_REGION)
            idle_minutes = _read_state()
            log.info("starting endpoint=%s poll=%ss state=%d", _ENDPOINT, _POLL_INTERVAL_SECONDS, idle_minutes)
            while True:
                t0 = time.monotonic()
                idle_minutes = await _poll_once(cw, idle_minutes)
                await asyncio.sleep(max(0.0, _POLL_INTERVAL_SECONDS - (time.monotonic() - t0)))

        if __name__ == "__main__":
            asyncio.run(_main())

  EnvoyConfigParam:
    Type: AWS::SSM::Parameter
    Condition: IsProd
    Properties:
      Name: !Sub "/${AWS::StackName}/flyte/envoy.yaml"
      Type: String
      Tier: Standard
      Description: Envoy auth-proxy config template (__APIKEY__/__BASIC__ substituted at boot).
      Value: |
        admin:
          address:
            socket_address: { address: 127.0.0.1, port_value: 9901 }
        static_resources:
          listeners:
          - name: ingress
            address:
              socket_address: { address: 0.0.0.0, port_value: 8080 }
            filter_chains:
            - filters:
              - name: envoy.filters.network.http_connection_manager
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                  stat_prefix: ingress
                  codec_type: AUTO
                  stream_idle_timeout: 0s
                  route_config:
                    name: local
                    virtual_hosts:
                    - name: all
                      domains: ["*"]
                      routes:
                      - match: { prefix: "/" }
                        route: { cluster: devbox, timeout: 0s }
                  http_filters:
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          -- Valid credentials are rendered in at boot from the API-key
                          -- secret (one Bearer + one Basic entry per token).
                          local ok = {__OKENTRIES__}
                          function envoy_on_request(handle)
                            local p = handle:headers():get(":path") or ""
                            if p == "/healthz" or p == "/readyz" then return end
                            local a = handle:headers():get("authorization") or ""
                            if ok[a] then return end
                            handle:respond({[":status"] = "401", ["www-authenticate"] = "Basic realm=\"flyte\"", ["content-type"] = "text/plain"}, "unauthorized\n")
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
          clusters:
          - name: devbox
            connect_timeout: 5s
            type: STATIC
            lb_policy: ROUND_ROBIN
            typed_extension_protocol_options:
              envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
                "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
                explicit_http_config:
                  http2_protocol_options: {}
            load_assignment:
              cluster_name: devbox
              endpoints:
              - lb_endpoints:
                - endpoint:
                    address:
                      socket_address: { address: 127.0.0.1, port_value: 80 }
  Instance:
    Type: AWS::EC2::Instance
    Properties:
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      SubnetId: !Ref PublicSubnet
      AvailabilityZone: !Select [0, !GetAZs ""]
      # The data volume is NOT attached here: user-data self-attaches it by ID at
      # boot. This keeps the instance freely replaceable (user-data changes apply
      # via in-place update-stack) instead of failing the EBS attach during the
      # create-before-delete replacement window.
      Tags:
        - Key: Name
          Value: !Ref AWS::StackName

  # -------------------------------------------------------------------------
  # Stop: CloudWatch alarm to SNS to Lambda to ec2:StopInstances.
  # -------------------------------------------------------------------------
  StopLambdaRole:
    Condition: WantsAutoStop
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: stop-actions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:StopInstances
                  - ec2:DescribeInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:ModifyListener
                Resource: "*"

  StopLambda:
    Condition: WantsAutoStop
    Type: AWS::Lambda::Function
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt StopLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          INSTANCE_ID: !Ref Instance
          # In Prod-wake mode (WantsProdWake) we set FLIP_LISTENER=1 and pass the
          # LB ARN + both TG ARNs so the lambda can flip the listener back to
          # wake-tg before stopping the EC2.
          FLIP_LISTENER: !If [WantsProdWake, "1", "0"]
          LOAD_BALANCER_ARN: !If [WantsProdWake, !Ref LoadBalancer, "n/a"]
          EC2_TARGET_GROUP_ARN: !If [WantsProdWake, !Ref Ec2TargetGroup, "n/a"]
          WAKE_TARGET_GROUP_ARN: !If [WantsProdWake, !Ref WakeTargetGroup, "n/a"]
      Code:
        ZipFile: |
          """CloudWatch-alarm-triggered stop. In Eval/Private mode (FLIP_LISTENER=0)
          just calls StopInstances. In Prod-wake mode (FLIP_LISTENER=1) first flips
          the ALB listener default action to wake-tg, so requests arriving during
          the stop window land on the wake lambda (which restarts the EC2)."""
          import logging, os
          import boto3
          log = logging.getLogger(); log.setLevel(logging.INFO)
          INSTANCE_ID = os.environ["INSTANCE_ID"]
          FLIP_LISTENER = os.environ.get("FLIP_LISTENER", "0") == "1"
          ec2 = boto3.client("ec2")
          elbv2 = boto3.client("elbv2") if FLIP_LISTENER else None

          def _flip_to_wake():
              lb_arn = os.environ["LOAD_BALANCER_ARN"]
              wake_tg = os.environ["WAKE_TARGET_GROUP_ARN"]
              listeners = elbv2.describe_listeners(LoadBalancerArn=lb_arn)["Listeners"]
              for lst in listeners:
                  if lst["Port"] == 443:
                      # Single-TG forward (ec2-tg stays health-checked via the
                      # keep-alive listener rule, not via this action).
                      elbv2.modify_listener(
                          ListenerArn=lst["ListenerArn"],
                          DefaultActions=[{"Type": "forward", "TargetGroupArn": wake_tg}],
                      )
                      log.info("listener flipped to wake-tg")
                      break

          def lambda_handler(event, _ctx):
              if FLIP_LISTENER:
                  _flip_to_wake()
              ec2.stop_instances(InstanceIds=[INSTANCE_ID])
              log.info("StopInstances issued for %s", INSTANCE_ID)

  StopAlarmTopic:
    Condition: WantsAutoStop
    Type: AWS::SNS::Topic
    Properties: {TopicName: !Sub "${AWS::StackName}-flyte-idle"}

  StopLambdaSnsPermission:
    Condition: WantsAutoStop
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref StopLambda
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Ref StopAlarmTopic

  StopLambdaSnsSubscription:
    Condition: WantsAutoStop
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: lambda
      TopicArn: !Ref StopAlarmTopic
      Endpoint: !GetAtt StopLambda.Arn

  IdleAlarm:
    Condition: WantsAutoStop
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-flyte-idle"
      Namespace: FlyteDevbox
      MetricName: IdleMinutes
      Dimensions: [{Name: InstanceId, Value: !Ref Instance}]
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 5
      DatapointsToAlarm: 5
      Threshold: !Ref IdleThresholdMinutes
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: [!Ref StopAlarmTopic]

  # -------------------------------------------------------------------------
  # AWS Backup: daily snapshot of the data volume, 7-day retention.
  # -------------------------------------------------------------------------
  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties: {BackupVaultName: !Sub "${AWS::StackName}-flyte-data"}

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: backup.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "${AWS::StackName}-flyte-data"
        BackupPlanRule:
          - RuleName: daily
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: cron(0 5 ? * * *)
            Lifecycle: {DeleteAfterDays: 7}

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: data-volume
        IamRoleArn: !GetAtt BackupRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: flyte-devbox:backup
            ConditionValue: "true"

  # =========================================================================
  # PROD MODE — created only when Domain is set.
  # ALB on 443 (HTTPS) with ACM cert (DNS-validated via Route 53), TG with
  # ProtocolVersion=HTTP2 so both REST UI and gRPC traffic work end-to-end.
  # =========================================================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProd
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: ALB ingress.
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref AllowedCidr
          Description: HTTPS

  AlbCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: IsProd
    Properties:
      DomainName: !Ref Domain
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref Domain
          HostedZoneId: !Ref HostedZoneId

  # We need TWO subnets across AZs for the ALB. Add a second one only in Prod.
  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Condition: IsProd
    Properties:
      VpcId: !Ref Vpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: !Select [1, !Cidr [!Ref VpcCidr, 2, 8]]
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub "${AWS::StackName}-public-b"}]

  PublicSubnetBAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: IsProd
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  LoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Condition: IsProd
    Properties:
      Type: application
      Scheme: internet-facing
      Subnets: [!Ref PublicSubnet, !Ref PublicSubnetB]
      SecurityGroups: [!Ref AlbSecurityGroup]

  Ec2TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: IsProd
    Properties:
      VpcId: !Ref Vpc
      TargetType: instance
      # Port 8080 = the on-host Envoy auth proxy, which enforces the API key and
      # forwards (h2c) to the devbox on :80. Health checks hit Envoy's /healthz
      # passthrough (exempt from auth) so ALB can see real devbox health.
      Port: 8080
      Protocol: HTTP
      ProtocolVersion: HTTP2   # supports both REST and gRPC over HTTP/2
      HealthCheckPath: /healthz
      HealthCheckIntervalSeconds: 15
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 2
      Matcher: { HttpCode: "200-499" }
      Targets:
        - Id: !Ref Instance
          Port: 8080

  HttpsListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: IsProd
    Properties:
      LoadBalancerArn: !Ref LoadBalancer
      Port: 443
      Protocol: HTTPS
      Certificates:
        - CertificateArn: !Ref AlbCertificate
      # The default action is a SINGLE-target-group forward, swapped wholesale by
      # the wake/stop lambdas. We can't use a weighted multi-TG forward here:
      # ec2-tg is ProtocolVersion HTTP2 (for gRPC) and wake-tg is a Lambda TG
      # (HTTP1 only), and ALB rejects a multi-TG forward whose target groups have
      # different protocol-versions. To still keep ec2-tg health-checked while the
      # default points at the wake lambda, Ec2KeepAliveRule (below) references
      # ec2-tg on an unused path so ALB never stops health-checking it.
      # WantsProdWake: start on wake-tg (serves the "starting" page until the EC2
      # is healthy, then the wake lambda flips the default to ec2-tg).
      # Always-on (AutoStop=No): forward straight to ec2-tg.
      DefaultActions: !If
        - WantsProdWake
        - - Type: forward
            TargetGroupArn: !Ref WakeTargetGroup
        - - Type: forward
            TargetGroupArn: !Ref Ec2TargetGroup

  # =========================================================================
  # PROD wake-on-request mechanism (only when AutoStop=Yes)
  # =========================================================================
  WakeTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Condition: WantsProdWake
    DependsOn: WakeLambdaPermission
    Properties:
      TargetType: lambda
      Targets:
        - Id: !GetAtt WakeLambda.Arn

  WakeLambdaRole:
    Type: AWS::IAM::Role
    Condition: WantsProdWake
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: {Service: lambda.amazonaws.com}
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: wake-actions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [ec2:DescribeInstances, ec2:StartInstances]
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:ModifyListener
                Resource: "*"
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Ref ApiKeySecret

  WakeLambda:
    Type: AWS::Lambda::Function
    Condition: WantsProdWake
    Properties:
      Runtime: python3.12
      Handler: index.lambda_handler
      Role: !GetAtt WakeLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          INSTANCE_ID: !Ref Instance
          LOAD_BALANCER_ARN: !Ref LoadBalancer
          EC2_TARGET_GROUP_ARN: !Ref Ec2TargetGroup
          API_KEY_SECRET_ARN: !Ref ApiKeySecret
      Code:
        ZipFile: |
          """Prod-mode wake handler. ALB targets this lambda while the EC2 is
          stopped. On invoke: first require the static API key (same key the
          on-host Envoy enforces) so only authenticated callers can wake (and
          bill) the box; then start the EC2 if stopped; once ec2-tg has a healthy
          target, flip the listener so the next request hits the EC2 directly.
          Until then, return a 'starting...' page that auto-refreshes."""
          import base64, json, logging, os
          import boto3

          log = logging.getLogger(); log.setLevel(logging.INFO)

          INSTANCE_ID = os.environ["INSTANCE_ID"]
          LOAD_BALANCER_ARN = os.environ["LOAD_BALANCER_ARN"]
          EC2_TG_ARN = os.environ["EC2_TARGET_GROUP_ARN"]
          API_KEY_SECRET_ARN = os.environ["API_KEY_SECRET_ARN"]

          ec2 = boto3.client("ec2")
          elbv2 = boto3.client("elbv2")
          sm = boto3.client("secretsmanager")

          def _tokens():
              # 'apikey' is a comma-separated list of valid tokens. Fetched per
              # invoke (wake is rare) so newly-added tokens take effect immediately.
              raw = sm.get_secret_value(SecretId=API_KEY_SECRET_ARN)["SecretString"]
              return [t.strip() for t in json.loads(raw)["apikey"].split(",") if t.strip()]

          def _authorized(event):
              """Accept `Authorization: Bearer <token>` (CLI) or HTTP Basic with the
              token as the password (browser), for any configured token. Header keys
              arrive lowercased from ALB."""
              h = {k.lower(): v for k, v in (event.get("headers") or {}).items()}
              auth = h.get("authorization", "")
              tokens = _tokens()
              if auth.startswith("Bearer "):
                  return auth[7:] in tokens
              if auth.startswith("Basic "):
                  try:
                      decoded = base64.b64decode(auth[6:]).decode("utf-8", "replace")
                      return decoded.split(":", 1)[-1] in tokens
                  except Exception:
                      return False
              return False

          def _unauthorized(event):
              h = {k.lower(): v for k, v in (event.get("headers") or {}).items()}
              # Challenge browsers with Basic so they show a native login prompt.
              hdrs = {"Content-Type": "text/plain"}
              if "text/html" in h.get("accept", ""):
                  hdrs["WWW-Authenticate"] = 'Basic realm="flyte"'
              return {"statusCode": 401, "headers": hdrs, "body": "unauthorized\n"}

          _LISTENER_ARN = None

          def _listener_arn():
              global _LISTENER_ARN
              if _LISTENER_ARN is None:
                  resp = elbv2.describe_listeners(LoadBalancerArn=LOAD_BALANCER_ARN)
                  for lst in resp["Listeners"]:
                      if lst["Port"] == 443:
                          _LISTENER_ARN = lst["ListenerArn"]; break
              return _LISTENER_ARN

          PAGE = """<!doctype html>
          <html><head>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="20">
          <title>Starting Flyte devbox…</title>
          <style>
          body{font-family:-apple-system,system-ui,sans-serif;background:#0f1115;color:#d8dee9;
               display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
          .box{text-align:center;max-width:520px;padding:24px}
          .spinner{width:48px;height:48px;border:4px solid #3b4252;border-top-color:#88c0d0;
                   border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
          @keyframes spin{to{transform:rotate(360deg)}}
          .detail{color:#6c7382;font-size:0.9em;margin-top:16px}
          </style></head><body><div class="box">
          <div class="spinner"></div>
          <h2>__TITLE__</h2>
          <p class="detail">__DETAIL__</p>
          <p class="detail">This page auto-refreshes every 20 seconds.</p>
          </div></body></html>
          """

          def _wants_html(event):
              h = {k.lower(): v for k, v in (event.get("headers") or {}).items()}
              return "text/html" in h.get("accept", "")

          def _response(event, status, title, detail):
              if _wants_html(event):
                  body = PAGE.replace("__TITLE__", title).replace("__DETAIL__", detail)
                  return {"statusCode": status, "headers": {"Content-Type": "text/html; charset=utf-8"}, "body": body}
              return {"statusCode": 503, "headers": {"Content-Type": "application/json", "Retry-After": "20"},
                      "body": '{"status":"waking","title":"%s"}' % title}

          def _flip_to_ec2(wake_tg_arn):
              # Single-TG forward to ec2-tg (HTTP2). wake_tg_arn is unused now that
              # we no longer weight between TGs, but kept for signature stability.
              elbv2.modify_listener(
                  ListenerArn=_listener_arn(),
                  DefaultActions=[{"Type": "forward", "TargetGroupArn": EC2_TG_ARN}],
              )

          def lambda_handler(event, _ctx):
              if not _authorized(event):
                  log.info("wake rejected: missing/invalid API key")
                  return _unauthorized(event)
              state = ec2.describe_instances(InstanceIds=[INSTANCE_ID])["Reservations"][0]["Instances"][0]["State"]["Name"]
              wake_tg_arn = event["requestContext"]["elb"]["targetGroupArn"]
              log.info("wake invoked state=%s", state)

              if state == "stopped":
                  ec2.start_instances(InstanceIds=[INSTANCE_ID])
                  return _response(event, 200, "Starting your Flyte devbox", "EC2 boot + Docker + k3s startup takes about 2 minutes.")
              if state in ("pending", "stopping"):
                  return _response(event, 200, "Devbox is " + state, "Reload in a moment.")
              if state == "running":
                  resp = elbv2.describe_target_health(TargetGroupArn=EC2_TG_ARN)
                  healthy = any(d["TargetHealth"]["State"] == "healthy" for d in resp["TargetHealthDescriptions"])
                  if healthy:
                      _flip_to_ec2(wake_tg_arn)
                      return _response(event, 200, "Ready", "Refresh to continue.")
                  return _response(event, 200, "Devbox is starting", "Flyte services coming up — give it another moment.")
              return _response(event, 503, "Unknown state: " + state, "Check the AWS console.")

  WakeLambdaPermission:
    Type: AWS::Lambda::Permission
    Condition: WantsProdWake
    Properties:
      FunctionName: !Ref WakeLambda
      Action: lambda:InvokeFunction
      Principal: elasticloadbalancing.amazonaws.com

  # /  ->  /v2  redirect, same as Eval mode.
  RootRedirectRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: IsProd
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 1
      Conditions:
        - Field: path-pattern
          PathPatternConfig: { Values: ["/"] }
      Actions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Host: "#{host}"
            Path: /v2
            Query: "#{query}"
            StatusCode: HTTP_302

  # Keeps ec2-tg referenced by the listener (and therefore continuously health-
  # checked) even while the default action points at the wake lambda. Without a
  # listener referencing it, ALB stops health-checking the TG and the wake lambda
  # can't tell when the EC2 is ready to flip back to. The path never matches real
  # traffic; this rule exists only to hold the reference. Only needed in the wake
  # configuration (in always-on mode the default action already references ec2-tg).
  Ec2KeepAliveRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Condition: WantsProdWake
    Properties:
      ListenerArn: !Ref HttpsListener
      Priority: 2
      Conditions:
        - Field: path-pattern
          PathPatternConfig: { Values: ["/__ec2-health-keepalive__"] }
      Actions:
        - Type: forward
          TargetGroupArn: !Ref Ec2TargetGroup

  DomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: IsProd
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref Domain
      Type: A
      AliasTarget:
        DNSName: !GetAtt LoadBalancer.DNSName
        HostedZoneId: !GetAtt LoadBalancer.CanonicalHostedZoneID
        EvaluateTargetHealth: false

  # =========================================================================
  # PROD-mode backend stubs — provisioned but NOT auto-wired into the chart.
  # Customer follows docs/PROD_WIRING.md to point Flyte at these resources.
  # =========================================================================

  # ---- Postgres (RDS) ----------------------------------------------------
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Condition: IsProd
    Properties:
      DBSubnetGroupDescription: Subnet group for the Flyte runs DB.
      SubnetIds: [!Ref PublicSubnet, !Ref PublicSubnetB]

  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Condition: IsProd
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: Postgres ingress from the devbox EC2 only.
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref InstanceSecurityGroup

  DbPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsProd
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${AWS::StackName}-flyte-db"
      Description: Flyte runs DB master password.
      GenerateSecretString:
        SecretStringTemplate: '{"username": "flyte"}'
        GenerateStringKey: password
        ExcludePunctuation: true
        PasswordLength: 32

  # Static API key that gates the UI + gRPC API in Prod (Flyte 2 OSS has no
  # native auth). Enforced by the on-host Envoy proxy and the wake lambda.
  # Clients send it as `Authorization: Bearer <apikey>`; browsers via HTTP Basic
  # (username flyte, password = apikey).
  ApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Condition: IsProd
    DeletionPolicy: Delete
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${AWS::StackName}-flyte-apikey"
      Description: "Comma-separated list of API tokens gating the Flyte UI + gRPC API. Edit 'apikey' to add/rotate (see docs/AUTH.md), then restart flyte-auth-proxy."
      GenerateSecretString:
        SecretStringTemplate: '{"username": "flyte"}'
        GenerateStringKey: apikey
        ExcludePunctuation: true
        PasswordLength: 40

  DbInstance:
    Type: AWS::RDS::DBInstance
    Condition: IsProd
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      Engine: postgres
      # EngineVersion omitted; AWS picks the current default for the engine.
      DBInstanceClass: db.t3.medium   # smallest class supported by Postgres 17+
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      DBName: flyte
      MasterUsername: flyte
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbPasswordSecret}::password}}"
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!Ref DbSecurityGroup]
      PubliclyAccessible: false
      BackupRetentionPeriod: 7
      MultiAZ: false   # single-AZ; v1.5 can opt into MultiAZ

  # ---- Image registry (ECR) ----------------------------------------------
  EcrRepository:
    Type: AWS::ECR::Repository
    Condition: IsProd
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Sub "${AWS::StackName}-flyte"
      ImageScanningConfiguration: {ScanOnPush: true}

  # ---- Instance role policy: grant S3 + ECR + RDS-secret access in Prod ---
  ProdBackendPolicy:
    Type: AWS::IAM::Policy
    Condition: IsProd
    Properties:
      PolicyName: flyte-devbox-prod-backend
      Roles: [!Ref InstanceRole]
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:AbortMultipartUpload
              - s3:ListMultipartUploadParts
            Resource: !Sub "${DataBucket.Arn}/*"
          - Effect: Allow
            Action:
              - s3:ListBucket
              - s3:GetBucketLocation
            Resource: !GetAtt DataBucket.Arn
          - Effect: Allow
            Action:
              - ecr:GetAuthorizationToken
              - ecr:BatchCheckLayerAvailability
              - ecr:GetDownloadUrlForLayer
              - ecr:BatchGetImage
              - ecr:InitiateLayerUpload
              - ecr:UploadLayerPart
              - ecr:CompleteLayerUpload
              - ecr:PutImage
            Resource: "*"
          - Effect: Allow
            Action: secretsmanager:GetSecretValue
            Resource:
              - !Ref DbPasswordSecret
              - !Ref ApiKeySecret

Outputs:
  # ---- Eval mode outputs (Eval+Public) ------------------------------------
  # We output the AWS-provided EC2 public DNS hostname (ec2-<dashed-eip>.<region-domain>)
  # rather than the raw EIP. Corporate web filters frequently allowlist
  # *.amazonaws.com but block raw IPs on non-standard ports; the DNS form
  # works in both cases. The hostname tracks the EIP (no DNS update on
  # stop/start) so customer bookmarks stay valid.
  UiUrlEval:
    Condition: WantsEvalPublic
    Description: Flyte UI (Eval mode). EC2 must be running.
    Value: !Sub "http://${Instance.PublicDnsName}/v2"

  ServingUrlEval:
    Condition: WantsEvalPublic
    Description: Internal apps ingress (Eval mode).
    Value: !Sub "http://${Instance.PublicDnsName}:8081"

  RegistryEndpointEval:
    Condition: WantsEvalPublic
    Description: Docker registry host:port (Eval mode). Use --insecure-registry on the docker daemon.
    Value: !Sub "${Instance.PublicDnsName}:5000"

  FlyteCliEndpointEval:
    Condition: WantsEvalPublic
    Description: Endpoint for `flyte create config --endpoint <this> --insecure` (Eval mode).
    Value: !Sub "${Instance.PublicDnsName}:80"

  EipEval:
    Condition: WantsEip
    Description: The Elastic IP (only when StableIp=Yes). For SG allowlists elsewhere; prefer the DNS hostname for actual access.
    Value: !Ref InstanceEip

  HostnameRefreshCli:
    Condition: WantsEvalPublic
    Description: |
      When StableIp=No, the EC2 gets a fresh public hostname on every start. Run this command
      after starting the EC2 to fetch the current hostname (the stack output URLs go stale).
    Value: !Sub "aws ec2 describe-instances --filters Name=tag:Name,Values=${AWS::StackName} Name=instance-state-name,Values=running --query 'Reservations[].Instances[].PublicDnsName' --output text"

  # ---- Prod mode outputs (HTTPS via Domain + backend stubs) ---------------
  UiUrlProd:
    Condition: IsProd
    Description: Flyte UI (Prod mode), HTTPS via Domain.
    Value: !Sub "https://${Domain}/v2"

  FlyteCliEndpointProd:
    Condition: IsProd
    Description: Endpoint for `flyte create config --endpoint <this>` (Prod mode; TLS by default — drop --insecure).
    Value: !Ref Domain

  ApiKeyRetrieveCli:
    Condition: IsProd
    Description: Fetch the API key that gates the UI + gRPC API (browser uses username 'flyte' + this as the password).
    Value: !Sub "aws secretsmanager get-secret-value --secret-id ${ApiKeySecret} --query SecretString --output text | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"apikey\"])'"

  ClientConfigProd:
    Condition: IsProd
    Description: Configure the flyte CLI to send the API key as a bearer token (run ApiKeyRetrieveCli first to get the key, substitute it for <API_KEY>).
    Value: !Sub "flyte create config --endpoint dns:///${Domain}:443 --auth-type external-command --command 'echo <API_KEY>'"

  ProdDbEndpoint:
    Condition: IsProd
    Description: RDS Postgres endpoint for the Flyte runs DB (Prod mode; wire up via PROD_WIRING.md).
    Value: !Sub "${DbInstance.Endpoint.Address}:${DbInstance.Endpoint.Port}"

  ProdDbSecretArn:
    Condition: IsProd
    Description: ARN of the Secrets Manager secret holding the RDS master password.
    Value: !Ref DbPasswordSecret

  ProdEcrUri:
    Condition: IsProd
    Description: ECR repository URI (Prod mode; for docker push from build pipelines).
    Value: !GetAtt EcrRepository.RepositoryUri

  # ---- Always-on outputs --------------------------------------------------
  InstanceId:
    Description: EC2 instance ID.
    Value: !Ref Instance

  BucketName:
    Condition: IsProd
    Description: S3 bucket provisioned for the Prod-mode external backend (wire up via docs/PROD_WIRING.md).
    Value: !Ref DataBucket

  StartCli:
    Description: Start the EC2 from the CLI without knowing the instance ID.
    Value: !Sub "aws ec2 start-instances --instance-ids $(aws ec2 describe-instances --filters Name=tag:Name,Values=${AWS::StackName} Name=instance-state-name,Values=stopped --query Reservations[].Instances[].InstanceId --output text)"

  StopCli:
    Description: Stop the EC2 on demand.
    Value: !Sub "aws ec2 stop-instances --instance-ids $(aws ec2 describe-instances --filters Name=tag:Name,Values=${AWS::StackName} Name=instance-state-name,Values=running --query Reservations[].Instances[].InstanceId --output text)"
